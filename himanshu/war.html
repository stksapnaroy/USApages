    <script>
      // Initialize Lucide Icons
      lucide.createIcons();

      // Mobile Menu Toggle
      const btn = document.getElementById("mobile-menu-btn");
      const menu = document.getElementById("mobile-menu");

      btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
      });

      // Close mobile menu on link click
      menu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          menu.classList.add("hidden");
        });
      });

      // Sticky Navbar styling on scroll
      const navbar = document.getElementById("navbar");
      window.addEventListener("scroll", () => {
        if (window.scrollY > 10) {
          navbar.classList.add("shadow-md");
          navbar.classList.replace("bg-white/90", "bg-white/95");
        } else {
          navbar.classList.remove("shadow-md");
          navbar.classList.replace("bg-white/95", "bg-white/90");
        }
      });

      // Scroll Reveal Animation with Intersection Observer
      const revealElements = document.querySelectorAll(".reveal");

      const revealOptions = {
        threshold: 0.1,
        rootMargin: "0px 0px -50px 0px",
      };

      const revealOnScroll = new IntersectionObserver(function (
        entries,
        observer,
      ) {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) {
            return;
          } else {
            entry.target.classList.add("active");
            observer.unobserve(entry.target);
          }
        });
      }, revealOptions);

      revealElements.forEach((el) => {
        revealOnScroll.observe(el);
      });
    </script>

    <script>
      const items = document.querySelectorAll(".accordion-item");

      items.forEach((item, index) => {
        const header = item.querySelector(".accordion-header");
        const content = item.querySelector(".accordion-content");
        const icon = item.querySelector(".icon");

        header.addEventListener("click", () => {
          const isOpen = item.classList.contains("active");

          // Close all
          items.forEach((i) => {
            i.classList.remove("active");

            const c = i.querySelector(".accordion-content");
            const ic = i.querySelector(".icon");
            const h = i.querySelector(".accordion-header");

            c.style.maxHeight = null;
            ic.textContent = "+";
            h.classList.remove("text-primaryRed");
            h.classList.add("text-gray-800");
          });

          // Open clicked (only if it was closed)
          if (!isOpen) {
            item.classList.add("active");
            content.style.maxHeight = content.scrollHeight + "px";
            icon.textContent = "×";
            header.classList.remove("text-gray-800");
            header.classList.add("text-primaryRed");
          }
        });
      });

      window.addEventListener("load", () => {
        const first = items[0];

        const content = first.querySelector(".accordion-content");
        const icon = first.querySelector(".icon");
        const header = first.querySelector(".accordion-header");

        first.classList.add("active");
        content.style.maxHeight = content.scrollHeight + "px";
        icon.textContent = "×";
        header.classList.add("text-primaryRed");
      });

      // language converter code
      const switcher = document.getElementById("langSwitcher");

      let currentLang = localStorage.getItem("lang") || "en";

      async function loadLanguage(lang) {
        const res = await fetch(`./locales-cost-solution/${lang}.json`);
        console.log("ressss", res)
        const translations = await res.json();

        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (translations[key]) {
            el.innerHTML = translations[key];
          }
        });

        localStorage.setItem("lang", lang);
      }

      // Init
      loadLanguage(currentLang);
      switcher.value = currentLang;

      // Change
      switcher.addEventListener("change", (e) => {
        loadLanguage(e.target.value);
      });
    </script>
  </body>
</html>
